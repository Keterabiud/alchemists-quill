<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --bg: #000000;
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.6);
      --dark-card: rgba(15, 15, 15, 0.88);
      --gray: #bbbbbb;
      --text: #f5f5f5;
      --shadow: 0 20px 80px rgba(0,0,0,0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: url('nebula-bg.jpg') no-repeat center center fixed;  /* ← your cosmic background */
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-img {
      height: 55px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a, .nav-links button {
      color: var(--gray);
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .nav-links a:hover, .nav-links button:hover {
      color: var(--gold);
    }

    main {
      padding-top: 100px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 4rem;
    }

    .hero-logo {
      width: 280px;
      max-width: 70%;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--text);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1.2rem;
      background: rgba(26, 26, 26, 0.9);
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      resize: vertical;
      margin-bottom: 1.2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    select, label, button {
      padding: 0.9rem 1.3rem;
      background: rgba(40,40,40,0.9);
      border: 1px solid #555;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button {
      background: linear-gradient(90deg, var(--gold), #e5c158);
      color: black;
      border: none;
      font-weight: 600;
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.55);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1rem;
      color: var(--gray);
    }

    .toggle-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
    }

    #outputSection {
      background: rgba(20,20,20,0.85);
      border-radius: 12px;
      padding: 1.8rem;
      border: 1px solid #444;
      margin-top: 2rem;
      min-height: 180px;
      position: relative;
    }

    #outputText {
      font-size: 1.15rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 100px;
    }

    .output-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .output-actions button {
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
    }

    /* Coming Soon – dramatic */
    .coming-soon {
      text-align: center;
      margin: 5rem 0;
      padding: 3rem 1.5rem;
      background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(40,20,0,0.4));
      border-radius: 16px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 0 60px rgba(212, 175, 55, 0.25);
      animation: pulse 8s infinite alternate;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.2); }
      100% { box-shadow: 0 0 80px rgba(212, 175, 55, 0.45); }
    }

    .coming-soon h2 {
      font-size: 2.8rem;
      color: var(--gold);
      margin-bottom: 1rem;
      text-shadow: 0 0 20px var(--gold-glow);
    }

    .coming-soon p {
      font-size: 1.3rem;
      color: var(--gray);
      margin: 0.8rem 0;
    }

    .x-link {
      color: white;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.2rem;
      font-size: 1.1rem;
    }

    .x-link:hover {
      color: var(--gold);
    }

    .x-icon {
      height: 1.4rem;
      filter: brightness(1.2);
    }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 1.05rem; }
      .btn { padding: 1.2rem; font-size: 1.1rem; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <main>
    <section class="hero">
      <img src="/images/logo-smoky.png" alt="Keter Aether" class="hero-logo"/>
      <p class="tagline">Turn everyday words into something fun & magical ✨</p>
      <blockquote id="rotatingQuote" class="quote"></blockquote>
    </section>

    <section class="input-section">
      <textarea id="modernInput" placeholder="Type your plea..." rows="6"></textarea>

      <div class="controls">
        <select id="styleSelect">
          <option value="shakespeare">Shakespearean</option>
          <option value="victorian">Victorian</option>
          <option value="poe">Poe (Gothic)</option>
          <option value="romantic">Romantic</option>
          <option value="genz">Gen Z Slang</option>
          <option value="sheng">Sheng (Kenyan street)</option>
          <option value="old-english">Old English</option>
          <option value="emoji-genz">Emoji-fied Gen Z</option>
          <option value="formal-british">Formal British</option>
          <option value="sheng-english">Sheng + English mix</option>
          <option value="german">German</option>
          <option value="kiswahili">Kiswahili</option>
        </select>

        <div class="toggle-group">
          <input type="checkbox" id="emojiSwitch" checked />
          <label for="emojiSwitch">Add emojis?</label>
        </div>

        <div class="toggle-group">
          <input type="checkbox" id="typewriterSwitch" checked />
          <label for="typewriterSwitch">Typewriter ASMR?</label>
        </div>

        <button id="transmuteBtn">Let's Go! 🚀</button>
      </div>

      <div id="outputSection" class="output-section" style="display:none;">
        <div id="styleLabel" class="output-header"></div>
        <div id="outputText" class="output-text"></div>

        <div class="output-actions">
          <button onclick="copyText()">Copy</button>
          <button onclick="speakText()">Speak Aloud</button>
          <button onclick="shareText()">Share</button>
        </div>
      </div>
    </section>

    <section class="coming-soon">
      <h2>Coming Soon</h2>
      <p>Premium voices • Real-time speech • Voice cloning</p>
      <p>Follow on 
        <a href="https://x.com/abiudketerr" target="_blank" class="x-link">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023_%28white%29.png" alt="X" class="x-icon"/>
          @abiudketerr
        </a>
      </p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2025 Keter Aether — from the creators <strong>KETER</strong></p>
    <small>"We are such stuff as dreams are made on."</small>
  </footer>

  <script>
    // Typewriter + emoji generation logic
    const outputText = document.getElementById('outputText');
    const typewriterSwitch = document.getElementById('typewriterSwitch');
    const emojiSwitch = document.getElementById('emojiSwitch');

    function typeWriter(text, element, speed = 35) {
      let i = 0;
      element.textContent = '';
      const interval = setInterval(() => {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          element.scrollTop = element.scrollHeight; // auto-scroll
        } else {
          clearInterval(interval);
        }
      }, speed);
    }

    // Simple emoji pool for dynamic insertion
    const emojiPool = ['✨', '🔥', '🌟', '⚡', '🪶', '👑', '💫', '🌙', '🖤', '🌀'];

    function addRandomEmojis(text) {
      if (!emojiSwitch.checked) return text;
      const words = text.split(' ');
      return words.map(word => {
        if (Math.random() < 0.15) { // \~15% chance per word
          const emoji = emojiPool[Math.floor(Math.random() * emojiPool.length)];
          return Math.random() < 0.5 ? word + emoji : emoji + word;
        }
        return word;
      }).join(' ');
    }

    // Simulate AI output (replace with your real transmutation logic)
    function generateTransmutedText() {
      const input = document.getElementById('modernInput').value.trim();
      if (!input) return "Please type something first...";

      const style = document.getElementById('styleSelect').value;
      let result = `This is a dramatic ${style} version of your text: ${input.toUpperCase()}!`;

      // Add emojis during generation
      result = addRandomEmojis(result);

      return result;
    }

    document.getElementById('transmuteBtn').addEventListener('click', () => {
      const outputSection = document.getElementById('outputSection');
      outputSection.style.display = 'block';

      const text = generateTransmutedText();

      if (typewriterSwitch.checked) {
        typeWriter(text, outputText, 30);
      } else {
        outputText.textContent = text;
      }
    });

    // Copy function
    function copyText() {
      navigator.clipboard.writeText(outputText.textContent)
        .then(() => alert("Copied to clipboard!"))
        .catch(() => alert("Copy failed"));
    }

    // Speak (basic)
    function speakText() {
      const utterance = new SpeechSynthesisUtterance(outputText.textContent);
      speechSynthesis.speak(utterance);
    }

    // Share (basic web share API)
    function shareText() {
      if (navigator.share) {
        navigator.share({
          title: 'Keter Aether Transmutation',
          text: outputText.textContent,
        }).catch(err => console.log("Share failed", err));
      } else {
        alert("Share not supported on this browser");
      }
    }
  </script>
</body>
</html>
