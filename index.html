<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="header">
  <div class="navbar">
    <img src="/images/logo-clean.png" class="logo-img" alt="Keter Aether"/>
  </div>
</header>

<section class="hero">
  <img src="/images/logo-clean.png" class="hero-logo" alt="Keter Aether"/>
  <h1 class="tagline">Alchemy of Language</h1>
  <p class="quote">“Give me your words — I shall transfigure them.”</p>
</section>

<section class="input-section">

  <!-- MODE PILLS -->
  <div class="mode-pills">
    <button class="pill active" data-mode="transmute">Transmutation</button>
    <button class="pill" data-mode="ghostwriter">Ghostwriter</button>
    <button class="pill" data-mode="critic">Critic</button>
  </div>

  <textarea id="mainInput" placeholder="Utter the forbidden phrase..."></textarea>

  <div class="controls">
    <select id="styleSelect">
      <optgroup label="Classical">
        <option value="Shakespearean">Shakespearean</option>
        <option value="Victorian">Victorian</option>
        <option value="Old English">Old English</option>
        <option value="Romantic">Romantic</option>
        <option value="Poe Gothic">Edgar Allan Poe (Gothic)</option>
      </optgroup>

      <optgroup label="Modern">
        <option value="Formal British">Formal British</option>
        <option value="Gen Z Slang">Gen Z Slang</option>
      </optgroup>

      <optgroup label="Languages">
        <option value="Kiswahili">Kiswahili</option>
        <option value="Sheng">Sheng (Kenyan Street)</option>
      </optgroup>
    </select>

    <label class="typewriter-toggle">
      <input type="checkbox" id="typewriterSwitch" checked />
      Typewriter ASMR
    </label>
  </div>

  <button id="transmuteBtn">Begin the Alchemy ✨</button>

  <div class="output-section" id="outputSection">
    <div class="output-text" id="outputText"></div>

    <div class="output-actions">
      <button onclick="copyText()">Copy</button>
      <button onclick="speakText()">Speak</button>
      <button onclick="shareText()">Share</button>
    </div>
  </div>

</section>

<footer class="footer">
  Conjured by <strong>KETER</strong>
</footer>

<script src="app.js"></script>
</body>
</html>
