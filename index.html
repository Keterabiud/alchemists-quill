<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clerk Android Test</title>

  <!-- Clerk SDK -->
  <script
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    crossorigin="anonymous">
  </script>

  <script>
    window.Clerk = window.Clerk || {};
    window.Clerk.publishableKey =
      "pk_test_Z2VudGxlLWxhYnJhZG9yLTI5LmNsZXJrLmFjY291bnRzLmRldiQ";
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
    }
    #box {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="box">
    <h1>Clerk Test</h1>
    <div id="clerk"></div>
  </div>

  <script>
    window.addEventListener("load", function () {
      if (!window.Clerk) {
        document.body.innerHTML = "<h2>❌ Clerk failed to load</h2>";
        return;
      }

      Clerk.load().then(() => {
        Clerk.mountSignIn("#clerk");
      }).catch(err => {
        document.body.innerHTML =
          "<pre style='color:red'>" + err.message + "</pre>";
      });
    });
  </script>

</body>
</html>
