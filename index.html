<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <header class="header">
    <nav class="navbar">
      <div class="logo">
        <img src="/images/logo-clean.png" alt="Keter Aether" class="logo-img"/>
      </div>
    </nav>
  </header>

  <main class="main-content">
    <section class="hero">
      <img src="/images/logo-smoky.png" alt="Keter Aether" class="hero-logo"/>
      <p class="tagline">Words Transformed • Voices Reborn</p>
      <blockquote id="rotatingQuote" class="quote"></blockquote>
    </section>

    <section class="input-section">
      <textarea
        id="modernInput"
        placeholder="Enter your words..."
        rows="4"
      ></textarea>

      <div class="controls">
        <select id="styleSelect">
          <option value="shakespeare">Shakespearean</option>
          <option value="victorian">Victorian</option>
          <option value="poe">Poe (Gothic)</option>
          <option value="romantic">Romantic</option>
          <option value="genz">Gen Z Slang</option>
          <option value="sheng">Sheng</option>
          <option value="german">German</option>
          <option value="kiswahili">Kiswahili</option>
        </select>

        <label class="toggle">
          <span>Emojis</span>
          <input type="checkbox" id="emojiSwitch" checked />
        </label>

        <label class="toggle">
          <span>Typewriter</span>
          <input type="checkbox" id="typewriterSwitch" />
        </label>

        <button id="transmuteBtn">Transmute</button>
      </div>

      <div id="outputSection" class="output-section">
        <div id="styleLabel" class="output-header"></div>
        <div id="outputText" class="output-text"></div>

        <div class="output-actions">
          <button onclick="copyText()">Copy</button>
          <button onclick="speakText()">Speak</button>
          <button onclick="shareText()">Share</button>
        </div>
      </div>
    </section>

    <section class="features" id="features">
      <div class="feature">
        <h3>Transmutation Engine</h3>
        <p>Shift tone, dialect, era, slang</p>
      </div>
      <div class="feature">
        <h3>Ghostwriter</h3>
        <p>Original poetry on demand</p>
      </div>
      <div class="feature">
        <h3>Critic’s Eye</h3>
        <p>Literary analysis</p>
      </div>
    </section>

    <section class="coming-soon">
      <h2>Coming Soon</h2>
      <p>Premium voices • Real-time speech • Voice cloning</p>
      <p>Follow <a href="https://x.com/abiudketerr" target="_blank">@abiudketerr</a></p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2025 Keter Aether — by KETER</p>
  </footer>

  <!-- Hidden typewriter sound -->
  <audio id="typewriterClick" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-old-typewriter-key-press-1369.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>
</body>
</html>
