<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keter Aether</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- PDF / Image export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body class="dark">

  <!-- HEADER -->
  <header class="header">
    <img src="/logo.png" class="logo-img" alt="Keter Aether" />
    <button id="themeToggle">🌙</button>
  </header>

  <!-- MAIN -->
  <main>

    <!-- INPUT -->
    <section class="panel">
      <textarea id="inputText" placeholder="Write or paste your text here..."></textarea>

      <div class="controls">
        <select id="style">
          <option value="poetic">Poetic</option>
          <option value="shakespearean">Shakespearean</option>
          <option value="victorian">Victorian</option>
          <option value="modern">Modern Elegant</option>
        </select>

        <label>
          Style Strength
          <input type="range" id="strength" min="0.3" max="1.2" step="0.1" value="0.8" />
        </label>
      </div>

      <div class="buttons">
        <button id="transmuteBtn">✨ Transmute</button>
        <button id="rewriteBtn">♻ Rewrite</button>
      </div>
    </section>

    <!-- OUTPUT -->
    <section class="panel output-panel">
      <div id="output" class="ink"></div>

      <div class="buttons">
        <button id="exportImg">🖼 Image</button>
        <button id="exportPdf">📄 PDF</button>
        <button id="speak">🔊 Voice</button>
      </div>
    </section>

    <!-- HISTORY -->
    <section class="panel history-panel">
      <h3>📜 History</h3>
      <ul id="history"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
  </html>
