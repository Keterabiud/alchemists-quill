<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Keter Aether</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="header">
  <img src="/images/logo-clean.png" class="logo-img">
</header>

<div class="mode-buttons">
  <button class="mode-btn active" data-mode="transmute">Transmutation Engine</button>
  <button class="mode-btn" data-mode="ghostwriter">Ghostwriter’s Quill</button>
  <button class="mode-btn" data-mode="critic">Critic’s Eye</button>
</div>

<main>

<section class="panel">

<textarea id="inputText" placeholder="Type your plea..."></textarea>

<div class="controls">
  <select id="styleSelect">
    <option>Modern English</option>
    <option>Shakespearean</option>
    <option>Victorian</option>
    <option>Romantic</option>
    <option>Poetic</option>
    <option>Formal</option>
  </select>

  <div class="slider-wrap">
    <label>Style Strength</label>
    <input type="range" id="strength" min="30" max="100" value="65">
  </div>

  <label><input type="checkbox" id="emojiToggle" checked> Emojis</label>
  <label><input type="checkbox" id="typeToggle" checked> Typewriter</label>
</div>

<div class="remix">
  <button data-tone="dramatic">✨ Dramatic</button>
  <button data-tone="playful">😂 Playful</button>
  <button data-tone="dark">🖤 Dark</button>
  <button data-tone="gentle">🌸 Gentle</button>
</div>

<div class="actions">
  <button id="submitBtn">Transmute ✨</button>
  <button id="rewriteBtn">Rewrite 🔁</button>
</div>

<div id="outputBox">
  <div id="outputText" class="ink"></div>

  <div class="output-actions">
    <button onclick="speakText()">🔊 Speak</button>
    <button onclick="exportImage()">🖼 Image</button>
    <button onclick="exportPDF()">📜 PDF</button>
  </div>
</div>

</section>

<section class="history-panel">
  <h3>🕯️ History</h3>
  <div id="historyList"></div>
</section>

<div class="theme-toggle">
  <button id="themeBtn">🌑 / ☀️</button>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
