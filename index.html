<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.6);
      --dark: rgba(15, 15, 15, 0.92);
      --gray: #bbbbbb;
      --text: #f5f5f5;
      --shadow: 0 20px 80px rgba(0,0,0,0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: url('nebula-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container {
      cursor: pointer;
      transition: transform 0.3s;
    }

    .logo-container:hover {
      transform: scale(1.08);
    }

    .logo-img {
      height: 60px;
      filter: drop-shadow(0 0 10px var(--gold-glow));
    }

    main {
      padding-top: 100px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero-logo {
      width: 260px;
      max-width: 70%;
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: 1.9rem;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1.2rem;
      background: rgba(26, 26, 26, 0.92);
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      resize: vertical;
      margin-bottom: 1.2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      justify-content: center;
      align-items: center;
    }

    select, label, button {
      padding: 0.9rem 1.4rem;
      background: rgba(40,40,40,0.9);
      border: 1px solid #555;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button {
      background: linear-gradient(90deg, var(--gold), #e5c158);
      color: black;
      border: none;
      font-weight: 600;
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1rem;
      color: var(--gray);
    }

    .toggle-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
    }

    #outputSection {
      background: rgba(20,20,20,0.9);
      border-radius: 12px;
      padding: 1.8rem;
      border: 1px solid #444;
      margin-top: 2rem;
      min-height: 180px;
      display: none;
    }

    #outputText {
      font-size: 1.18rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .output-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .output-actions button {
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .hero-logo { width: 240px; }
      .tagline { font-size: 1.6rem; }
      .btn { padding: 1.2rem; font-size: 1.1rem; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container" onclick="window.open('https://x.com/abiudketerr', '_blank')">
      <img src="/images/logo-clean.png" alt="Keter Aether" class="logo-img"/>
    </div>
  </header>

  <main>
    <section class="hero">
      <img src="/images/logo-smoky.png" alt="Keter Aether" class="hero-logo"/>
      <p class="tagline">Turn everyday words into something fun & magical ✨</p>
    </section>

    <section class="input-section">
      <textarea id="modernInput" placeholder="Type your plea..." rows="6"></textarea>

      <div class="controls">
        <select id="styleSelect">
          <option value="shakespeare">Shakespearean</option>
          <option value="victorian">Victorian</option>
          <option value="poe">Poe (Gothic)</option>
          <option value="romantic">Romantic</option>
          <option value="genz">Gen Z Slang</option>
          <option value="sheng">Sheng (Kenyan street)</option>
          <option value="old-english">Old English</option>
          <option value="emoji-genz">Emoji-fied Gen Z</option>
          <option value="formal-british">Formal British</option>
          <option value="sheng-english">Sheng + English mix</option>
          <option value="german">German</option>
          <option value="kiswahili">Kiswahili</option>
        </select>

        <div class="toggle-group">
          <input type="checkbox" id="emojiSwitch" />
          <label for="emojiSwitch">Add emojis?</label>
        </div>

        <div class="toggle-group">
          <input type="checkbox" id="typewriterSwitch" />
          <label for="typewriterSwitch">Typewriter ASMR?</label>
        </div>

        <button id="transmuteBtn">Let's Go! 🚀</button>
      </div>

      <div id="outputSection">
        <div id="outputText" class="output-text"></div>

        <div class="output-actions">
          <button onclick="copyText()">Copy</button>
          <button onclick="speakText()">Speak Aloud</button>
          <button onclick="shareText()">Share</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Keter Aether — from the creators <strong>KETER</strong></p>
    <small>"We are such stuff as dreams are made on."</small>
  </footer>

  <script>
    const outputTextEl = document.getElementById('outputText');
    const typewriterToggle = document.getElementById('typewriterSwitch');
    const emojiToggle = document.getElementById('emojiSwitch');

    // Style-specific emoji sets (placed intelligently, not randomly)
    const emojiSets = {
      shakespeare: ['🪶', '🏰', '⚔️', '🌹', '📜', '👑'],
      victorian: ['🕰️', '🖋️', '🪞', '🌸', '🎩', '👗'],
      poe: ['🪦', '🦇', '🕯️', '📖', '🕸️', '☠️'],
      romantic: ['❤️', '🌹', '🌅', '💌', '🌙', '💞'],
      genz: ['🔥', '💀', '😭', '🤯', '🫶', '✨'],
      sheng: ['🇰🇪', '🔥', '😂', '💪', '🫡', '👊'],
      'old-english': ['🗡️', '🏰', '📜', '⚔️', '🛡️', '👑'],
      'emoji-genz': ['🔥', '💀', '🫡', '🤌', '🫶', '😭'],
      'formal-british': ['☕', '🧐', '📜', '🎩', '🖋️', '🔔'],
      'sheng-english': ['🔥', '🇰🇪', '😂', '💪', '🫶', '👊'],
      german: ['🍺', '🦅', '⚡', '🛡️', '📜', '🎻'],
      kiswahili: ['🌴', '🦁', '🇰🇪', '🌅', '💃', '🪘']
    };

    function getStyleEmoji(style) {
      const set = emojiSets[style] || emojiSets['genz'];
      return set[Math.floor(Math.random() * set.length)];
    }

    function typeWriter(text, element, speed = 35) {
      let i = 0;
      element.textContent = '';
      const interval = setInterval(() => {
        if (i < text.length) {
          let char = text.charAt(i);
          // Intelligent emoji placement: after punctuation or every \~10 chars
          if (emojiToggle.checked && (char === '.' || char === '!' || char === '?' || char === ',' || i % 10 === 0)) {
            char += getStyleEmoji(document.getElementById('styleSelect').value);
          }
          element.textContent += char;
          i++;
          element.scrollTop = element.scrollHeight;
        } else {
          clearInterval(interval);
        }
      }, speed);
    }

    // Simple transmutation logic (replace with real AI later)
    function transmute(text) {
      const style = document.getElementById('styleSelect').value;
      // Basic transformation examples
      if (style === 'shakespeare') return text.replace(/you/g, 'thou').replace(/is/g, 'art').toUpperCase();
      if (style === 'genz') return text.replace(/good/g, 'fire').replace(/love/g, 'vibes') + ' no cap';
      if (style === 'old-english') return text.replace(/the/g, 'þe').toUpperCase() + ' FORSOOTH!';
      // Default: just uppercase + flair
      return text.toUpperCase();
    }

    document.getElementById('transmuteBtn').addEventListener('click', () => {
      const input = document.getElementById('modernInput').value.trim();
      if (!input) return alert("Type something first...");

      document.getElementById('outputSection').style.display = 'block';

      const result = transmute(input);

      if (typewriterToggle.checked) {
        typeWriter(result, document.getElementById('outputText'));
      } else {
        document.getElementById('outputText').textContent = result;
      }
    });

    function copyText() {
      navigator.clipboard.writeText(document.getElementById('outputText').textContent)
        .then(() => alert("Copied!"))
        .catch(() => alert("Copy failed"));
    }

    function speakText() {
      const ut = new SpeechSynthesisUtterance(document.getElementById('outputText').textContent);
      speechSynthesis.speak(ut);
    }

    function shareText() {
      if (navigator.share) {
        navigator.share({
          title: 'Keter Aether Creation',
          text: document.getElementById('outputText').textContent,
        });
      } else {
        alert("Share not supported");
      }
    }
  </script>
</body>
</html>
