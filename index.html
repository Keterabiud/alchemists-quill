<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>

  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="dark">

  <header class="header">
    <h1 class="logo">🜏 Keter Aether</h1>
  </header>

  <main class="container">

    <!-- INPUT -->
    <textarea
      id="inputText"
      placeholder="Write or paste your text here..."
    ></textarea>

    <!-- CONTROLS -->
    <div class="controls">

      <!-- CUSTOM STYLE DROPDOWN -->
      <div class="dropdown">
        <button id="styleBtn" class="dropdown-btn">Poetic ▼</button>
        <ul id="styleMenu" class="dropdown-menu hidden">
          <li data-style="poetic">Poetic</li>
          <li data-style="shakespearean">Shakespearean</li>
          <li data-style="victorian">Victorian</li>
          <li data-style="modern elegant">Modern Elegant</li>
        </ul>
      </div>

      <!-- STRENGTH -->
      <div class="strength">
        <label>Style Strength</label>
        <input type="range" id="strength" min="0.2" max="1" step="0.1" value="0.7"/>
      </div>

    </div>

    <!-- MODES -->
    <div class="modes">
      <button class="mode active" data-mode="transmute">Transmute</button>
      <button class="mode" data-mode="ghostwriter">Ghostwriter</button>
      <button class="mode" data-mode="critic">Critic’s Eye</button>
    </div>

    <!-- ACTION -->
    <button id="transmuteBtn" class="primary">✨ Transmute</button>

    <!-- OUTPUT -->
    <section id="outputSection" class="output hidden">
      <pre id="outputText"></pre>

      <div class="output-actions">
        <button onclick="rewrite()">🔁 Rewrite</button>
        <button onclick="copyText()">📋 Copy</button>
        <button onclick="speak()">🔊 Voice</button>
      </div>
    </section>

    <!-- HISTORY -->
    <section class="history">
      <h3>📜 History</h3>
      <ul id="historyList"></ul>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
