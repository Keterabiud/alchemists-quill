<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.6);
      --dark: rgba(15, 15, 15, 0.92);
      --gray: #bbbbbb;
      --text: #f5f5f5;
      --shadow: 0 20px 80px rgba(0,0,0,0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: url('nebula-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-container {
      cursor: pointer;
      transition: transform 0.3s;
    }

    .logo-container:hover {
      transform: scale(1.08);
    }

    .logo-img {
      height: 60px;
      filter: drop-shadow(0 0 10px var(--gold-glow));
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 90px 1rem 2rem;
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: 0.9rem 1.6rem;
      background: linear-gradient(90deg, var(--gold), #e5c158);
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
      min-width: 200px;
      text-align: center;
    }

    .mode-btn.active {
      transform: scale(1.05);
      box-shadow: 0 12px 35px rgba(212, 175, 55, 0.7);
    }

    .mode-btn:hover:not(.active) {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(212, 175, 55, 0.55);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .section {
      display: none;
      background: rgba(20,20,20,0.88);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid #444;
      margin-bottom: 2rem;
    }

    .section.active {
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1.2rem;
      background: rgba(26, 26, 26, 0.92);
      border: 1px solid #444;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      resize: vertical;
      margin-bottom: 1.2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.8rem;
      justify-content: center;
      align-items: center;
    }

    select, label, button {
      padding: 0.9rem 1.4rem;
      background: rgba(40,40,40,0.9);
      border: 1px solid #555;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button {
      background: linear-gradient(90deg, var(--gold), #e5c158);
      color: black;
      border: none;
      font-weight: 600;
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1rem;
      color: var(--gray);
    }

    .toggle-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
    }

    .output-section {
      background: rgba(20,20,20,0.9);
      border-radius: 12px;
      padding: 1.8rem;
      border: 1px solid #444;
      margin-top: 2rem;
      min-height: 180px;
    }

    .output-text {
      font-size: 1.18rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .output-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .output-actions button {
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
      margin: 4rem 0;
    }

    .feature {
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: all 0.4s;
    }

    .feature:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.35);
    }

    .feature h3 {
      font-size: 1.6rem;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    .feature p {
      color: var(--gray);
      line-height: 1.6;
    }

    .coming-soon {
      text-align: center;
      margin: 6rem 0 4rem;
      padding: 4rem 1.5rem;
      background: linear-gradient(135deg, rgba(20,20,20,0.95), rgba(40,20,0,0.5));
      border-radius: 24px;
      border: 2px solid rgba(212, 175, 55, 0.4);
      box-shadow: 0 0 80px rgba(212, 175, 55, 0.35);
      animation: dramaticPulse 6s infinite alternate;
    }

    @keyframes dramaticPulse {
      0% { box-shadow: 0 0 50px rgba(212, 175, 55, 0.25); transform: scale(1); }
      100% { box-shadow: 0 0 100px rgba(212, 175, 55, 0.55); transform: scale(1.01); }
    }

    .coming-soon h2 {
      font-size: 3.2rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 30px var(--gold-glow);
    }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray);
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .mode-buttons { flex-direction: column; }
      .mode-btn { width: 100%; }
      .hero-logo { width: 240px; }
      .tagline { font-size: 1.6rem; }
      .coming-soon h2 { font-size: 2.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container" onclick="window.open('https://x.com/abiudketerr', '_blank')">
      <img src="/images/logo-clean.png" alt="Keter Aether" class="logo-img"/>
    </div>
  </header>

  <div class="mode-buttons">
    <button class="mode-btn active" onclick="switchMode('transmute')">Transmutation Engine</button>
    <button class="mode-btn" onclick="switchMode('ghost')">Ghostwriter's Quill</button>
    <button class="mode-btn" onclick="switchMode('critic')">Critic's Eye</button>
  </div>

  <main>
    <!-- Transmutation Engine -->
    <section id="transmute" class="section active">
      <textarea id="transmuteInput" placeholder="Type your plea..." rows="6"></textarea>

      <div class="controls">
        <select id="styleSelect">
          <option value="shakespeare">Shakespearean</option>
          <option value="victorian">Victorian</option>
          <option value="poe">Poe (Gothic)</option>
          <option value="romantic">Romantic</option>
          <option value="genz">Gen Z Slang</option>
          <option value="sheng">Sheng (Kenyan street)</option>
          <option value="old-english">Old English</option>
          <option value="emoji-genz">Emoji-fied Gen Z</option>
          <option value="formal-british">Formal British</option>
          <option value="sheng-english">Sheng + English mix</option>
          <option value="german">German</option>
          <option value="kiswahili">Kiswahili</option>
        </select>

        <div class="toggle-group">
          <input type="checkbox" id="emojiSwitch" />
          <label for="emojiSwitch">Add emojis?</label>
        </div>

        <div class="toggle-group">
          <input type="checkbox" id="typewriterSwitch" />
          <label for="typewriterSwitch">Typewriter ASMR?</label>
        </div>

        <button onclick="transmuteText()">Transmute ✨</button>
      </div>

      <div id="transmuteOutputSection" class="output-section" style="display:none;">
        <div id="transmuteOutput" class="output-text"></div>
        <div class="output-actions">
          <button onclick="copyText('transmuteOutput')">Copy</button>
          <button onclick="speakText('transmuteOutput')">Speak Aloud</button>
          <button onclick="shareText('transmuteOutput')">Share</button>
        </div>
      </div>
    </section>

    <!-- Ghostwriter -->
    <section id="ghost" class="section">
      <textarea id="ghostPrompt" placeholder="Describe your poem, story, mood, or theme..." rows="6"></textarea>

      <div class="controls">
        <div class="toggle-group">
          <input type="checkbox" id="ghostEmojiSwitch" />
          <label for="ghostEmojiSwitch">Add emojis?</label>
        </div>

        <div class="toggle-group">
          <input type="checkbox" id="ghostTypewriterSwitch" />
          <label for="ghostTypewriterSwitch">Typewriter ASMR?</label>
        </div>

        <button onclick="generateGhost()">Invoke Quill 🪶</button>
      </div>

      <div id="ghostOutputSection" class="output-section" style="display:none;">
        <div id="ghostOutput" class="output-text"></div>
        <div class="output-actions">
          <button onclick="copyText('ghostOutput')">Copy</button>
          <button onclick="speakText('ghostOutput')">Speak Aloud</button>
          <button onclick="shareText('ghostOutput')">Share</button>
        </div>
      </div>
    </section>

    <!-- Critic's Eye -->
    <section id="critic" class="section">
      <p style="margin-bottom:1rem; color:var(--gray);">Paste text or use last output</p>
      <textarea id="criticInput" placeholder="Paste text to analyze..." rows="8"></textarea>

      <button onclick="analyzeText()">Analyze 🔍</button>

      <div id="criticOutputSection" class="output-section" style="display:none; margin-top:2rem;">
        <div id="criticOutput" class="output-text"></div>
        <div class="output-actions">
          <button onclick="copyText('criticOutput')">Copy</button>
          <button onclick="speakText('criticOutput')">Speak Aloud</button>
          <button onclick="shareText('criticOutput')">Share</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 Keter Aether — from the creators <strong>KETER</strong></p>
    <small>"We are such stuff as dreams are made on."</small>
  </footer>

  <script>
    // Mode switching
    function switchMode(mode) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(mode).classList.add('active');
      document.querySelector(`button[onclick="switchMode('${mode}')"]`).classList.add('active');
    }

    // Typewriter
    function typeWriter(text, element, speed = 35) {
      let i = 0;
      element.textContent = '';
      const interval = setInterval(() => {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          element.scrollTop = element.scrollHeight;
        } else {
          clearInterval(interval);
        }
      }, speed);
    }

    // Transmutation Engine
    function transmuteText() {
      const input = document.getElementById('transmuteInput').value.trim();
      if (!input) return alert("Type something first...");

      const outputSection = document.getElementById('transmuteOutputSection');
      const outputText = document.getElementById('transmuteOutput');
      outputSection.style.display = 'block';
      outputText.textContent = "Transmuting...";

      // Replace with real Groq call later
      const style = document.getElementById('styleSelect').value;
      const result = input.toUpperCase(); // pure output – no prefix

      if (document.getElementById('typewriterSwitch').checked) {
        typeWriter(result, outputText);
      } else {
        outputText.textContent = result;
      }
    }

    // Ghostwriter
    function generateGhost() {
      const prompt = document.getElementById('ghostPrompt').value.trim();
      if (!prompt) return alert("Describe something first...");

      const outputSection = document.getElementById('ghostOutputSection');
      const outputText = document.getElementById('ghostOutput');
      outputSection.style.display = 'block';
      outputText.textContent = "Summoning...";

      // Fake creative generation – replace with Groq
      const result = `From the void: ${prompt}...\n\nShadows whisper, stars align,\nA tale begins in moonlit rhyme...`;

      if (document.getElementById('ghostTypewriterSwitch').checked) {
        typeWriter(result, outputText);
      } else {
        outputText.textContent = result;
      }
    }

    // Critic's Eye
    function analyzeText() {
      let text = document.getElementById('criticInput').value.trim();

      if (!text) {
        text = document.getElementById('transmuteOutput').textContent ||
               document.getElementById('ghostOutput').textContent || "";
        if (!text) return alert("Generate or paste text first!");
      }

      const outputSection = document.getElementById('criticOutputSection');
      const outputText = document.getElementById('criticOutput');
      outputSection.style.display = 'block';
      outputText.textContent = "Analyzing...";

      // Fake analysis – replace with Groq
      const result = `Critic's Eye:\n\n- Tone: Dramatic & mystical\n- Structure: Free verse\n- Devices: Metaphor, imagery\n- Suggestion: Add sensory details for immersion.`;

      outputText.textContent = result;
    }

    // Helpers
    function copyText(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => alert("Copied!"));
    }

    function speakText(id) {
      const text = document.getElementById(id).textContent;
      const ut = new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(ut);
    }

    function shareText(id) {
      const text = document.getElementById(id).textContent;
      if (navigator.share) {
        navigator.share({ title: 'Keter Aether', text });
      } else {
        alert("Share not supported");
      }
    }
  </script>
</body>
            </html>
