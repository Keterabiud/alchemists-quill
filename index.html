<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keter Aether</title>

<!-- FontAwesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Styles -->
<link rel="stylesheet" href="styles.css">

</head>
<body>

<header>
  <img src="/images/logo-clean.png" alt="Keter Aether" class="logo" onclick="window.open('https://x.com/abiudketerr','_blank')">
</header>

<!-- Mode Pills -->
<div class="mode-pills" id="modePills">
  <button class="pill active" data-mode="transmute">Transmutation Engine</button>
  <button class="pill" data-mode="ghostwriter">Ghostwriter's Quill</button>
  <button class="pill" data-mode="critic">Critic's Eye</button>
</div>

<!-- Input Section -->
<div class="input-section">
  <textarea id="modernInput" placeholder="Type your plea..."></textarea>

  <div class="controls">
    <select id="styleSelect">
      <option value="shakespeare">Shakespearean</option>
      <option value="victorian">Victorian</option>
      <option value="old-english">Old English</option>
      <option value="poe">Poe (Gothic)</option>
      <option value="romantic">Romantic</option>
      <option value="genz">Gen Z Slang</option>
      <option value="emoji-genz">Emoji-fied Gen Z</option>
      <option value="sheng">Sheng (Kenyan street)</option>
      <option value="formal-british">Formal British</option>
      <option value="kiswahili">Kiswahili</option>
    </select>

    <label class="typewriter-toggle">
      <input type="checkbox" id="typewriterSwitch"> Typewriter ASMR
    </label>

    <label class="emoji-toggle">
      <input type="checkbox" id="emojiSwitch" checked> Add Emojis
    </label>
  </div>

  <button id="transmuteBtn">Transmute ✨</button>

</div>

<!-- Output Section -->
<div id="outputSection" class="output-section">
  <div id="outputText" class="output-text"></div>

  <div class="output-actions">
    <button onclick="copyText()"><i class="fa-regular fa-copy"></i> Copy</button>
    <button onclick="speakText()"><i class="fa-regular fa-comment"></i> Speak</button>
    <button onclick="shareText()"><i class="fa-solid fa-share"></i> Share</button>
  </div>
</div>

<!-- Footer -->
<footer>
  © 2025 Keter Aether — <strong>KETER</strong>
</footer>

<!-- Typewriter click sound -->
<audio id="typewriterClick" src="/sounds/typewriter-click.mp3" preload="auto"></audio>

<!-- Scripts -->
<script src="app.js"></script>

</body>
</html>
