<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keter Aether</title>
  <link rel="stylesheet" href="styles.css"/>

  <!-- Clerk SDK -->
  <script 
    async 
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" 
    crossorigin="anonymous"
  ></script>

  <!-- Clerk key -->
  <script>
    window.Clerk = window.Clerk || {};
    window.Clerk.publishableKey = 'pk_test_Z2VudGxlLWxhYnJhZG9yLTI5LmNsZXJrLmFjY291bnRzLmRldiQ';
  </script>
</head>
<body>

  <!-- Login Gate – FULL SCREEN, PERFECTLY CENTERED -->
  <div id="login-gate">
    <div class="login-center-box">
      <img src="/images/logo-clean.png" alt="Keter Aether" class="login-logo"/>
      <h1>Welcome to Keter Aether</h1>
      <p>Sign in or create an account to access the transmutation engine</p>

      <!-- Clerk sign-in form mounts here -->
      <div id="clerk-sign-in"></div>
    </div>
  </div>

  <!-- Main site – hidden until signed in -->
  <div id="main-site" style="display: none;">
    <header class="header">
      <nav class="navbar">
        <div class="logo">
          <img src="/images/logo-clean.png" alt="Keter Aether" class="logo-img"/>
        </div>

        <ul class="nav-links" id="navLinks">
          <li><a href="#">Home</a></li>
          <li><a href="#features">Features</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">API</a></li>
          <li><button class="btn-enter">ENTER</button></li>
        </ul>

        <div id="clerk-user" style="margin-left: auto;">
          <div id="userButton"></div>
        </div>

        <div class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <!-- Your existing hero, input, features, coming-soon sections here -->
      <section class="hero">
        <img src="/images/logo-smoky.png" alt="Keter Aether" class="hero-logo"/>
        <p class="tagline">Turn everyday words into something fun & magical ✨</p>
        <blockquote id="rotatingQuote" class="quote"></blockquote>
      </section>

      <!-- ... rest of your main content ... -->
    </main>

    <footer class="footer">
      <p>© 2025 Keter Aether — from the creators <strong>KETER</strong></p>
      <small>"We are such stuff as dreams are made on."</small>
    </footer>
  </div>

  <audio id="typewriterClick" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-old-typewriter-key-press-1369.mp3" type="audio/mpeg">
  </audio>

  <script src="app.js"></script>

  <!-- Clerk mounting script – fixed and debugged -->
  <script>
    function initClerk() {
      if (typeof Clerk === 'undefined' || !Clerk.load) {
        setTimeout(initClerk, 1000);
        return;
      }

      Clerk.load().then(() => {
        console.log("Clerk loaded – mounting sign-in");

        const container = document.getElementById('clerk-sign-in');
        if (!container) {
          console.error("No #clerk-sign-in container found");
          return;
        }

        Clerk.mountSignIn(container, {
          appearance: {
            elements: {
              formButtonPrimary: { backgroundColor: '#d4af37', color: '#000' },
              card: { backgroundColor: '#111', borderRadius: '12px' }
            }
          }
        });

        Clerk.addListener('user', (user) => {
          if (user) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
          }
        });
      }).catch(err => console.error("Clerk error:", err));
    }

    initClerk();
  </script>
</body>
</html>
